  # =========================================================================
  # JOB 3: SECURITY SCAN - TOUS LES SERVICES
  # =========================================================================
  # Détecte les vulnérabilités dans les dépendances
  
  security:
    name: 'Security Scan - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: ['service-users', 'api-gateway', 'service-containers', 'service-gamifications', 'service-iot', 'service-analytics','service-routes']
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/${{ matrix.service }}
      
      # npm audit = audit des dépendances et génération de rapport JSON
      - name: 'Run npm audit and save report'
        run: |
          mkdir -p reports/security
          npm audit --omit=dev --json > reports/security/npm-audit-${{ matrix.service }}.json || true
        working-directory: ecotrack-sjma/services/${{ matrix.service }}
        continue-on-error: true

      - name: 'Upload dependency audit report'
        uses: actions/upload-artifact@v4
        with:
          name: report-dependency-audit-${{ matrix.service }}
          path: ecotrack-sjma/services/${{ matrix.service }}/reports/security/npm-audit-${{ matrix.service }}.json
          if-no-files-found: warn

  # =========================================================================
  # JOB 3B: SAST - CODEQL
  # =========================================================================

  security-sast:
    name: 'Security SAST - CodeQL'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    env:
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: true

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Initialize CodeQL'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: 'Autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: 'Analyze with CodeQL'
        uses: github/codeql-action/analyze@v3
        id: codeql-analyze

      - name: 'Upload CodeQL SARIF results'
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          category: 'codeql-ecotrack-sast'
          wait-for-processing: false
        continue-on-error: true

      - name: 'Collect CodeQL results as artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-sast-codeql-results
          path: 'results/'
          if-no-files-found: ignore

  # =========================================================================
  # JOB 3C: DAST - OWASP ZAP BASELINE
  # =========================================================================

  security-dast:
    name: 'Security DAST - OWASP ZAP'
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Start API Gateway stack'
        run: docker compose -f ecotrack-sjma/docker-compose.yml up -d api-gateway service-users service-containers service-routes service-iot service-analytics postgres redis

      - name: 'Run ZAP Baseline Scan'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000/api-docs/'
          cmd_options: '-a -j -m 5 -T 10'

      - name: 'Upload DAST reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-dast-zap
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn
      
      # Optionnel: Snyk scan (si tu as un compte Snyk)
      # - name: 'Run Snyk scan'
      #   run: npx snyk test
      #   working-directory: service-users
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # =========================================================================
  # JOB 3D: COLLECT ALL TEST REPORTS & COVERAGE
  # =========================================================================
  # Agrège tous les rapports: Coverage, Test Reports, SAST/DAST

  collect-reports:
    name: ' Collect All Reports'
    runs-on: ubuntu-latest
    if: always()
    needs: [test, test-containers, test-containers-integration, test-gamifications, test-iot, test-iot-integration, test-analytics, test-analytics-integration, test-analytics-e2e, test-frontend, test-integration, test-pyramid, test-routes-unit, test-routes-integration, test-users-integration, test-api-gateway, test-api-gateway-integration, test-gamifications-integration, test-frontend-integration, security, security-sast, security-dast]
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install system dependencies for canvas'
        run: sudo apt-get update && sudo apt-get install -y libpixman-1-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev

      - name: 'Create reports directory'
        run: mkdir -p reports/{coverage,tests,security}

      - name: ' DEBUG: List all artifacts available'
        run: |
          echo "=========================================="
          echo " Looking for coverage directories..."
          echo "=========================================="
          echo ""
          echo "Backend services:"
          find ecotrack-sjma/services -type d -name "coverage" 2>/dev/null | while read dir; do
            echo "  ✓ $dir"
          done
          echo ""
          echo "Frontend:"
          if [ -d "ecotrack-sjma/frontend/coverage" ]; then
            echo "  ✓ ecotrack-sjma/frontend/coverage"
          else
            echo "  ✗ frontend/coverage not found"
          fi
          echo ""
          echo "Reports:"
          ls -la reports/ 2>/dev/null || echo "  (No reports yet)"
          echo "=========================================="


      # ===== COLLECT COVERAGE REPORTS =====
      - name: 'Install dependencies for coverage collection'
        run: |
          echo "Installing dependencies for coverage..."
          for service in service-users service-containers service-gamifications service-routes service-iot service-analytics api-gateway; do
            if [ -d "ecotrack-sjma/services/$service" ]; then
              echo "  → Installing $service..."
              npm ci --prefix ecotrack-sjma/services/$service 2>&1 | tail -5 || echo "  ⚠ Failed to install $service"
            fi
          done

      - name: 'Generate coverage reports'
        run: |
          echo "Generating coverage reports..."
          for service in service-users service-containers service-gamifications service-routes service-iot service-analytics api-gateway; do
            if [ -d "ecotrack-sjma/services/$service" ]; then
              echo "  → Testing $service..."
              cd ecotrack-sjma/services/$service
              npm run test:coverage 2>&1 | grep -E '(PASS|FAIL|coverage)' | head -10 || true
              if [ -d "coverage" ]; then
                echo "    ✓ Coverage found, copying..."
                cp -r coverage ../../../../reports/coverage/${service} 2>/dev/null || true
              else
                echo "    ⚠ No coverage directory found"
              fi
              cd ../../../../
            fi
          done
        continue-on-error: true

      # ===== COLLECT FRONTEND COVERAGE =====
      - name: 'Generate frontend coverage'
        run: |
          echo "Generating frontend coverage..."
          cd ecotrack-sjma/frontend
          npm ci 2>&1 | tail -3 || echo "⚠ Failed to install frontend deps"
          npm run test:coverage 2>&1 | grep -E '(PASS|FAIL|coverage)' | head -10 || true
          if [ -d "coverage" ]; then
            echo "  ✓ Frontend coverage found, copying..."
            cp -r coverage ../../reports/coverage/frontend
          else
            echo "  ⚠ No frontend coverage directory found"
          fi
        continue-on-error: true

      # ===== UPLOAD CONSOLIDATED REPORTS =====
      - name: 'Upload consolidated coverage reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-coverage-all
          path: reports/coverage/
          if-no-files-found: ignore

      - name: 'Debug: List coverage directories'
        if: always()
        run: |
          echo "Coverage directories found:"
          find ecotrack-sjma/services -type d -name "coverage" 2>/dev/null | head -20
          echo ""
          echo "Reports coverage directories:"
          find reports -type d 2>/dev/null | head -20

      - name: 'Upload service-specific coverage'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend-all-services
          path: |
            ecotrack-sjma/services/*/coverage/
          if-no-files-found: ignore

      - name: 'Upload frontend coverage'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-all
          path: ecotrack-sjma/frontend/coverage/
          if-no-files-found: ignore

      # ===== GENERATE TEST REPORTS WITH JSON OUTPUT =====
      - name: 'Generate test reports (JSON format)'
        run: |
          echo "Generating test reports in JSON format..."
          for service in service-users service-containers service-gamifications service-routes service-iot service-analytics api-gateway; do
            if [ -d "ecotrack-sjma/services/$service" ]; then
              echo "  → Generating tests for $service..."
              mkdir -p ecotrack-sjma/services/$service/test-results
              cd ecotrack-sjma/services/$service
              npm test -- --json --outputFile=test-results/test-report.json 2>&1 | tail -5 || true
              cd ../../../../
            fi
          done
        continue-on-error: true

      - name: 'Generate frontend test reports'
        run: |
          echo "Generating frontend test reports..."
          mkdir -p ecotrack-sjma/frontend/test-results
          cd ecotrack-sjma/frontend
          npm run test -- --reporter=json --outputFile=test-results/test-report.json 2>&1 | tail -5 || true
        continue-on-error: true

      # ===== FINAL VERIFICATION & UPLOAD ALL ARTIFACTS =====
      - name: 'Final artifact verification'
        if: always()
        run: |
          echo "=========================================="
          echo "📊 ARTIFACT VERIFICATION REPORT"
          echo "=========================================="
          
          echo ""
          echo "✅ COVERAGE REPORTS:"
          find ecotrack-sjma/services ecotrack-sjma/frontend -type d -name "coverage" 2>/dev/null | while read dir; do
            size=$(du -sh "$dir" 2>/dev/null | cut -f1)
            echo "   ✓ $dir ($size)"
          done
          
          echo ""
          echo "✅ TEST REPORTS:"
          find ecotrack-sjma/services ecotrack-sjma/frontend -type f -name "test-report.json" -o -name "junit.xml" 2>/dev/null | while read file; do
            size=$(wc -c < "$file" 2>/dev/null | numfmt --to=iec-i --suffix=B 2>/dev/null || echo "$(wc -c < "$file") bytes")
            echo "   ✓ $file ($size)"
          done
          
          echo ""
          echo "✅ COVERAGE DIRECTORIES SUMMARY:"
          du -sh reports/coverage/* 2>/dev/null || echo "   ⚠ No consolidated coverage yet"
          
          echo ""
          echo "=========================================="

      - name: 'Create downloadable archives'
        if: always()
        run: |
          echo "Creating archives for easy download..."
          mkdir -p archives
          
          # Coverage archive
          if [ -d "reports/coverage" ] && [ "$(ls -A reports/coverage/)" ]; then
            tar -czf archives/coverage-all.tar.gz -C reports coverage/ 2>/dev/null && echo "✓ coverage-all.tar.gz"
          fi
          
          # Backend coverage archive
          if find ecotrack-sjma/services -type d -name "coverage" | grep -q .; then
            tar -czf archives/coverage-backend.tar.gz ecotrack-sjma/services/*/coverage/ 2>/dev/null && echo "✓ coverage-backend.tar.gz"
          fi
          
          # Frontend coverage archive
          if [ -d "ecotrack-sjma/frontend/coverage" ] && [ "$(ls -A ecotrack-sjma/frontend/coverage/)" ]; then
            tar -czf archives/coverage-frontend.tar.gz ecotrack-sjma/frontend/coverage/ 2>/dev/null && echo "✓ coverage-frontend.tar.gz"
          fi
          
          echo "Archives created in archives/ directory"
        continue-on-error: true

      - name: 'Upload coverage archives'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-archives-compressed
          path: archives/
          if-no-files-found: ignore

      - name: 'Upload all test reports from services'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-tests-all-services
          path: |
            ecotrack-sjma/services/*/test-results/
            ecotrack-sjma/services/*/reports/
          if-no-files-found: ignore

      - name: 'Upload frontend test reports'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-tests-frontend
          path: |
            ecotrack-sjma/frontend/test-results/
            ecotrack-sjma/frontend/reports/
          if-no-files-found: ignore

      - name: 'Create final artifact summary'
        if: always()
        run: |
          cat > artifact-summary.txt << 'EOF'
          ========================================
          ECOTRACK CI/CD ARTIFACT SUMMARY
          ========================================
          
          COVERAGE ARTIFACTS:
          - reports-coverage-all: All consolidated coverage reports
          - coverage-backend-all-services: Individual service coverage directories
          - coverage-frontend-all: Frontend coverage report
          - coverage-archives-compressed: Compressed tar.gz files for easy download
          
          TEST ARTIFACTS:
          - report-tests-all-services: All backend service test reports (JSON)
          - report-tests-frontend: Frontend test reports (JSON)
          - report-integration-*: Individual integration test reports
          - report-e2e-service-containers: E2E test reports
          
          SECURITY ARTIFACTS:
          - report-dependency-audit-*: npm audit reports for each service (7 total)
          - report-sast-codeql-results: CodeQL SAST analysis results
          - report-dast-zap: OWASP ZAP DAST scan results
          
          MISC ARTIFACTS:
          - report-test-pyramid: Test pyramid metrics and analysis
          
          DOWNLOAD INSTRUCTIONS:
          1. Go to GitHub Actions run
          2. Scroll to "Artifacts" section
          3. Click on artifact name to download
          4. For tar.gz files: tar -xzf <file>.tar.gz to extract
          
          ========================================
          EOF
          cat artifact-summary.txt
      
      - name: 'Upload artifact summary'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ARTIFACT-SUMMARY
          path: artifact-summary.txt
          if-no-files-found: ignore

  # =========================================================================
  # JOB 4: BUILD DOCKER - TOUS LES SERVICES
  # =========================================================================
  # Construit les images Docker pour tous les services
  
  build:
    name: 'Build Docker - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: service-users
            image-name: ecotrack-service-users
            port: 3010
          - service: api-gateway
            image-name: ecotrack-api-gateway
            port: 3000
          - service: service-containers
            image-name: ecotrack-service-containers
            port: 3011
          - service: service-gamifications
            image-name: ecotrack-service-gamifications
            port: 3014
          - service: service-routes
            image-name: ecotrack-service-routes
            port: 3012
          - service: service-iot
            image-name: ecotrack-service-iot
            port: 3013
          - service: service-analytics
            image-name: ecotrack-service-analytics
            port: 3015
    
    # Attend que tous les tests réussissent
    needs: [test, test-containers, test-gamifications, test-iot, test-analytics, test-frontend, test-integration, test-e2e, test-pyramid, test-users-integration, test-users-e2e, test-api-gateway, test-api-gateway-integration, test-api-gateway-e2e, test-gamifications-integration, test-gamifications-e2e, test-frontend-integration, test-frontend-e2e, test-routes-unit, test-routes-integration, test-routes-e2e]
    
    # Permissions pour pousser sur le registry
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      # Setup buildx pour build multi-platform (ARM64, AMD64, etc.)
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3
      
      # Login au GitHub Container Registry (pour pousser l'image)
      - name: 'Log in to Container Registry'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      # Métadonnées pour le tag de l'image
      - name: 'Extract metadata'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      # Build et push l'image Docker
      - name: 'Build and push Docker image'
        uses: docker/build-push-action@v5
        with:
          context: ./ecotrack-sjma/services/${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}  # Push sauf en PR
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # JOB 5: TEST DOCKER IMAGE - TOUS LES SERVICES
  # =========================================================================
  # Lance le conteneur Docker construit et valide qu'il démarre
  
  test-docker:
    name: 'Test Docker - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: service-users
            image-name: ecotrack-service-users
            port: 3010
            env-vars: '-e APP_PORT=3010 -e JWT_SECRET=test -e JWT_REFRESH_SECRET=test -e DATABASE_URL=postgresql://test_user:test_pass@172.17.0.1:5432/ecotrack_test'
          - service: api-gateway
            image-name: ecotrack-api-gateway
            port: 3000
            env-vars: '-e GATEWAY_PORT=3000 -e USERS_SERVICE_URL=http://localhost:3010'
          - service: service-gamifications
            image-name: ecotrack-service-gamifications
            port: 3014
            env-vars: '-e PORT=3014 -e DATABASE_URL=postgresql://test_user:test_pass@172.17.0.1:5432/ecotrack_test'
    
    needs: build
    if: github.event_name == 'pull_request'  # Seulement en PR
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3
      
      # Build localement l'image (sans push)
      - name: 'Build Docker image'
        uses: docker/build-push-action@v5
        with:
          context: ./ecotrack-sjma/services/${{ matrix.service }}
          load: true
          tags: ${{ matrix.image-name }}:test
      
      # Lance le conteneur et teste /health endpoint
      - name: 'Start container and test health'
        run: |
          docker run -d \
            --name test-container \
            -p ${{ matrix.port }}:${{ matrix.port }} \
            ${{ matrix.env-vars }} \
            ${{ matrix.image-name }}:test
          
          # Attendre que le container démarre avec retry
          echo "Waiting for container to start..."
          for i in {1..30}; do
            if curl -f http://localhost:${{ matrix.port }}/health 2>/dev/null; then
              echo "Container is healthy!"
              break
            fi
            echo "Attempt $i/30 failed, retrying in 2s..."
            sleep 2
          done
          
          # Vérifier une dernière fois
          curl -f http://localhost:${{ matrix.port }}/health || {
            echo "Health check failed. Container logs:"
            docker logs test-container
            exit 1
          }
          
          echo "Health check passed!"
          docker logs test-container
          docker stop test-container

# ============================================================================
# RÉSUMÉ WORKFLOW
# ============================================================================
# 
# Quand tu fais: git push
#   → GitHub Actions détecte le push
#   → Lance tous les jobs en parallèle (lint, test, security, build)
#   → Si l'un échoue, l'image ne se build pas
#   → Résultats visibles dans GitHub "Actions" tab
#
# En production:
#   - CD: l'image "latest" se déploie auto sur K8s
#   - Monitoring alerte si deployment échoue
#
# Coûts GitHub Actions:
#   - 2000 min/mois gratuit pour repos public
#   - Payant au-delà
