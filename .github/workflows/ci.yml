          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          sudo apt-get update > /dev/null && sudo apt-get install -y postgresql-client > /dev/null
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user -d ecotrack_test > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          echo "✗ PostgreSQL failed to start"
          docker ps
          docker logs $(docker ps -q -f ancestor=postgis/postgis:16-3.4-alpine) 2>&1 | tail -20
          exit 1
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-iot
      
      - name: 'Run E2E tests'
        run: npm run test:e2e
        working-directory: ecotrack-sjma/services/service-iot
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Cleanup test services'
        if: always()
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml down -v

  # =========================================================================
  # JOB 2E: UNIT TESTS - SERVICE-ANALYTICS
  # =========================================================================
  # Lance Jest pour service-analytics avec PostgreSQL
  
  test-analytics:
    name: 'Unit Tests - service-analytics'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install system dependencies for canvas'
        run: sudo apt-get update && sudo apt-get install -y libpixman-1-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-analytics
      
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: ecotrack-sjma/services/service-analytics
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
        continue-on-error: true
      
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./ecotrack-sjma/services/service-analytics/coverage/coverage-final.json
          flags: unittests-analytics
        continue-on-error: true

      - name: 'Upload coverage artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service-analytics
          path: ecotrack-sjma/services/service-analytics/coverage/
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2E1: INTEGRATION TESTS - SERVICE-ANALYTICS (Test Pyramid - Level 2 ~22%)
  # =========================================================================
  # 32 tests | ~22% coverage | ~5s | Coût: Moyen
  # Test les interactions entre modules (routes, services, repositories)

  test-analytics-integration:
    name: ' Integration Tests (22%) - service-analytics'
    runs-on: ubuntu-latest

    needs: test-analytics

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install system dependencies for canvas'
        run: sudo apt-get update && sudo apt-get install -y libpixman-1-dev libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev

      - name: 'Start test services (docker-compose)'
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml up -d
        timeout-minutes: 3

      - name: 'Wait for PostgreSQL to be ready'
        run: |
          echo "Waiting for PostgreSQL..."
          echo "Docker containers running:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          sudo apt-get update > /dev/null && sudo apt-get install -y postgresql-client > /dev/null
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user -d ecotrack_test > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          echo "✗ PostgreSQL failed to start"
          docker ps
          docker logs $(docker ps -q -f ancestor=postgis/postgis:16-3.4-alpine) 2>&1 | tail -20
          exit 1

      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-analytics

      - name: 'Run Database Migrations'
        working-directory: ecotrack-sjma/database
        run: npm ci && npm run migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Run Integration Tests (32 tests)'
        run: npm run test:integration
        working-directory: ecotrack-sjma/services/service-analytics
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Cleanup test services'
        if: always()
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml down -v

