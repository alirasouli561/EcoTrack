# ============================================================================
# GITHUB ACTIONS CI/CD PIPELINE - ECO TRACK
# ============================================================================
#
# CONCEPT: Test Pyramid avec cibles de couverture
#
# TEST PYRAMID CIBLES (60% Unit / 30% Integration / 10% E2E):
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ LEVEL 3: E2E     │ 10%   │ ~20s │ Coût: Élevé    │ Tests parcours      │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ LEVEL 2: INT     │ 30%   │ ~5s  │ Coût: Moyen   │ Tests API/module  │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ LEVEL 1: UNIT    │ 60%   │ <2s  │ Coût: Faible  │ Tests fonctions  │
# └─────────────────────────────────────────────────────────────────────────────┘
#
#
# TRIGGER: Push sur toutes branches + PR
# ============================================================================
# ============================================================================

name: 'CI/CD Pipeline'

# Déclenche ce workflow
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed
  workflow_dispatch:

# Variables env globales pour ce workflow
env:
  REGISTRY: ghcr.io  # GitHub Container Registry (public registry GitHub)

jobs:
  # =========================================================================
  # JOB 1: CODE QUALITY (LINT) - TOUS LES SERVICES
  # =========================================================================
  # Vérifie que le code respecte les normes (indentation, syntax, etc.)
  
  lint:
    name: 'Lint Code - ${{ matrix.service }}'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        service: ['service-users', 'api-gateway', 'service-containers', 'service-gamifications', 'service-routes','service-iot','service-analytics']    
    steps:
      # Étape 1: Télécharger le code du repo
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      # Étape 2: Installer Node.js
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Étape 3: Installer dépendances
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/${{ matrix.service }}
      
      # Étape 4: Lancer ESLint (si config existe)
      - name: 'Run ESLint'
        run: npx eslint src/ --max-warnings 10 || echo "ESLint not configured"
        working-directory: ecotrack-sjma/services/${{ matrix.service }}
        continue-on-error: true

  # =========================================================================
  # JOB 2: UNIT TESTS - SERVICE-USERS SEULEMENT (a des tests)
  # =========================================================================
  # Lance Jest, collecte la couverture de code
  
  test:
    name: 'Unit Tests - service-users'
    runs-on: ubuntu-latest
    
    # Dépend du lint (lint doit réussir en premier)
    needs: lint
    
    services:
      # Service PostgreSQL utilisé durant les tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-users
      
      - name: 'Verify Jest installation'
        if: always()
        working-directory: ecotrack-sjma/services/service-users
        run: |
          echo "Checking Jest installation..."
          npx jest --version
          echo "Jest version verified ✓"
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:coverage 2>&1 | tee test-output.log
        working-directory: ecotrack-sjma/services/service-users
        env:
          # Base de test dans le service postgres ci-dessus
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
          NODE_ENV: test
          ACCESS_TOKEN_SECRET: test_secret_access
          REFRESH_TOKEN_SECRET: test_secret_refresh
        continue-on-error: true
      
      - name: 'Show test output'
        if: always()
        working-directory: ecotrack-sjma/services/service-users
        run: |
          echo "=== TEST OUTPUT ==="
          tail -100 test-output.log || echo "No test output log found"
      
      - name: 'Verify test script exists'
        if: always()
        working-directory: ecotrack-sjma/services/service-users
        run: |
          echo "Available scripts in package.json:"
          grep -A 10 '"scripts"' package.json

      # Upload couverture vers Codecov (optionnel, visualiser la couverture)
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./ecotrack-sjma/services/service-users/coverage/coverage-final.json
          flags: unittests
        continue-on-error: true

      - name: 'Debug: Check coverage files exist'
        if: always()
        run: |
          echo "=== SERVICE: service-users ==="
          echo ""
          echo "📁 Service directory structure:"
          ls -la ecotrack-sjma/services/service-users/ | head -20
          echo ""
          echo "🧪 Jest configuration:"
          if [ -f "ecotrack-sjma/services/service-users/jest.config.js" ]; then
            echo "✅ jest.config.js found"
          else
            echo "⚠️ jest.config.js NOT found"
          fi
          echo ""
          echo "📊 Coverage directory status:"
          if [ -d "ecotrack-sjma/services/service-users/coverage" ]; then
            echo "✅ Coverage directory found"
            ls -lah ecotrack-sjma/services/service-users/coverage/ | head -15
          else
            echo "❌ No coverage directory found"
          fi


      - name: 'Upload coverage artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service-users
          path: ecotrack-sjma/services/service-users/coverage/
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2B: UNIT TESTS - SERVICE-CONTAINERS
  # =========================================================================
  # Lance Jest pour service-containers avec PostgreSQL + PostGIS
  
  test-containers:
    name: 'Unit Tests - service-containers'
    runs-on: ubuntu-latest
    
    # Dépend du lint
    needs: lint
    
    services:
      # Service PostgreSQL avec PostGIS pour les tests
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-containers

      - name: 'Run Database Migrations'
        working-directory: ecotrack-sjma/database
        run: npm ci && npm run migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
      
      # Initialiser le schéma de test
      - name: 'Initialize test database'
        run: |
          PGPASSWORD=test_pass psql -h localhost -U test_user -d ecotrack_test -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          PGPASSWORD=test_pass psql -h localhost -U test_user -d ecotrack_test -f src/db/init-db-pg.sql || echo "Schema init skipped"
        working-directory: ecotrack-sjma/services/service-containers
        continue-on-error: true
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: ecotrack-sjma/services/service-containers
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test
          NODE_ENV: test
        continue-on-error: true
      
      # Upload couverture
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./ecotrack-sjma/services/service-containers/coverage/coverage-final.json
          flags: unittests-containers
        continue-on-error: true

      - name: 'Upload coverage artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service-containers
          path: ecotrack-sjma/services/service-containers/coverage/
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2B1: INTEGRATION TESTS - SERVICE-CONTAINERS (Test Pyramid - Level 2)
  # =========================================================================
  # 19 tests | Conditional (requires DB) | ~1s | Coût: Moyen
  # Test les interactions entre routes, services, repositories

  test-containers-integration:
    name: ' Integration Tests - service-containers'
    runs-on: ubuntu-latest

    needs: test-containers

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Start test services (docker-compose)'
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml up -d
        timeout-minutes: 3

      - name: 'Wait for PostgreSQL to be ready'
        run: |
          echo "Waiting for PostgreSQL..."
          echo "Docker containers running:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          sudo apt-get update > /dev/null && sudo apt-get install -y postgresql-client > /dev/null
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user -d ecotrack_test > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          echo "✗ PostgreSQL failed to start"
          docker ps
          docker logs $(docker ps -q -f ancestor=postgis/postgis:16-3.4-alpine) 2>&1 | tail -20
          exit 1

      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-containers

      - name: 'Run Database Migrations'
        working-directory: ecotrack-sjma/database
        run: npm ci && npm run migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Run Integration Tests (19 tests)'
        run: npm run test:integration
        working-directory: ecotrack-sjma/services/service-containers
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
        continue-on-error: true

      - name: 'Cleanup test services'
        if: always()
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml down -v


  # =========================================================================
  # JOB 2B2: E2E TESTS - SERVICE-CONTAINERS (Test Pyramid - Level 3)
  # =========================================================================
  # 12 tests | 100% passing | ~1s | Coût: Élevé
  # Test les parcours complets d'accès conteneurs

  test-containers-e2e:
    name: ' E2E Tests - service-containers'
    runs-on: ubuntu-latest

    needs: test-containers-integration

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Start test services (docker-compose)'
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml up -d
        timeout-minutes: 3

      - name: 'Wait for PostgreSQL to be ready'
        run: |
          echo "Waiting for PostgreSQL..."
          echo "Docker containers running:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          sudo apt-get update > /dev/null && sudo apt-get install -y postgresql-client > /dev/null
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user -d ecotrack_test > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          echo "✗ PostgreSQL failed to start"
          docker ps
          docker logs $(docker ps -q -f ancestor=postgis/postgis:16-3.4-alpine) 2>&1 | tail -20
          exit 1

      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-containers

      - name: 'Run E2E Tests (12 tests)'
        run: npm run test:e2e
        working-directory: ecotrack-sjma/services/service-containers
        continue-on-error: true
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: test_user
          PGPASSWORD: test_pass
          PGDATABASE: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Cleanup test services'
        if: always()
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml down -v

  # =========================================================================
  # JOB 2C: UNIT TESTS - SERVICE-GAMIFICATIONS
  # =========================================================================
  # Lance Jest pour service-gamifications avec PostgreSQL
  
  test-gamifications:
    name: 'Unit Tests - service-gamifications'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      # Service PostgreSQL pour les tests
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-gamifications
      
      # Lance Jest avec couverture
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: ecotrack-sjma/services/service-gamifications
        env:
          NODE_ENV: test
          GAMIFICATIONS_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
          GAMIFICATIONS_AUTO_SCHEMA: true
        continue-on-error: true
      
      # Upload couverture
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./ecotrack-sjma/services/service-gamifications/coverage/coverage-final.json
          flags: unittests-gamifications
        continue-on-error: true

      - name: 'Upload coverage artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service-gamifications
          path: ecotrack-sjma/services/service-gamifications/coverage/
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2D: UNIT TESTS - SERVICE-IOT (NEW!)
  # =========================================================================
  # Lance Jest pour service-iot avec PostgreSQL
  
  test-iot:
    name: 'Unit Tests - service-iot'
    runs-on: ubuntu-latest
    
    needs: lint
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: ecotrack_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/service-iot
      
      - name: 'Run Jest tests'
        run: npm run test:coverage
        working-directory: ecotrack-sjma/services/service-iot
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test
        continue-on-error: true
      
      - name: 'Upload coverage to Codecov'
        uses: codecov/codecov-action@v5
        with:
          files: ./ecotrack-sjma/services/service-iot/coverage/coverage-final.json
          flags: unittests-iot
        continue-on-error: true

      - name: 'Upload coverage artifact'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-service-iot
          path: ecotrack-sjma/services/service-iot/coverage/
          if-no-files-found: ignore

  # =========================================================================
  # JOB 2D1: INTEGRATION TESTS - SERVICE-IOT (Test Pyramid - Level 2)
  # =========================================================================
  # 6 tests | 20% of pyramid | ~2s | Coût: Moyen
  # Test gateway integration + sensor-measurement-service + cache flows

  test-iot-integration:
    name: ' Integration Tests (20%) - service-iot'
    runs-on: ubuntu-latest
    needs: test-iot
    
    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4
      
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Start test services (docker-compose)'
