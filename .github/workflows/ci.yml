  test-frontend-e2e:
    name: ' E2E Tests - frontend'
    runs-on: ubuntu-latest

    needs: test-frontend-integration

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
