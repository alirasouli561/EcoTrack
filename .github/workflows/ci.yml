        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Start test services (docker-compose)'
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml up -d
        timeout-minutes: 3

      - name: 'Wait for PostgreSQL to be ready'
        run: |
          echo "Waiting for PostgreSQL..."
          echo "Docker containers running:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          sudo apt-get update > /dev/null && sudo apt-get install -y postgresql-client > /dev/null
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user -d ecotrack_test > /dev/null 2>&1; then
              echo "✓ PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready yet..."
            sleep 2
          done
          echo "✗ PostgreSQL failed to start"
          docker ps
          docker logs $(docker ps -q -f ancestor=postgis/postgis:16-3.4-alpine) 2>&1 | tail -20
          exit 1

      - name: 'Install dependencies'
        run: npm ci
        working-directory: ecotrack-sjma/services/api-gateway

      - name: 'Run Database Migrations'
        working-directory: ecotrack-sjma/database
        run: npm ci && npm run migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_pass
          DB_NAME: ecotrack_test
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/ecotrack_test

      - name: 'Run Integration Tests'
        run: npm run test:integration
        working-directory: ecotrack-sjma/services/api-gateway
        env:
          NODE_ENV: test
        continue-on-error: true

      - name: 'Cleanup test services'
        if: always()
        run: docker compose -f ecotrack-sjma/docker-compose.test.yml down -v

